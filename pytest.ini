[pytest]
testpaths = tests

addopts = 
    -v
    --strict-markers
    --tb=short
    --maxfail=1
    --cov=src
    --cov-report=html
    --cov-report=term
    --cov-branch

markers =
    unit: Модульные тесты (быстрые, без внешних зависимостей)
    integration: Интеграционные тесты (проверяют взаимодействие компонентов)
    slow: Медленные тесты (требуют времени)
    network: Тесты, требующие сети
    api: Тесты, работающие с реальными API

norecursedirs = .git .venv venv data logs __pycache__

pythonpath = .

asyncio_mode = auto